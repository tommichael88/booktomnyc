name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '41 14 * * 3'
  workflow_dispatch:   # 👈 added for manual trigger

permissions:
  security-events: write
  packages:        read
  actions:         read
  contents:        read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # ✅ already on v4 (Node.js 20, but fine)

      - name: Setup CodeQL cache
        uses: actions/cache@v4             # 👈 upgraded from v3 to v4
        with:
          path: ~/.cache/codeql
          key: ${{ runner.os }}-codeql-${{ matrix.language }}-${{ matrix.build-mode }}
          restore-keys: |
            ${{ runner.os }}-codeql-${{ matrix.language }}-
            ${{ runner.os }}-codeql-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4  # 👈 upgraded from v3 to v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml   # 👈 new – ignore problematic files

      - name: Manual build (if needed)
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "🔧 You set build-mode: manual. Drop your build commands here."
          # e.g.:
          #   npm install && npm run build
          #   pip install -r requirements.txt
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4  # 👈 upgraded from v3 to v4
        with:
          category: "/language:${{ matrix.language }}"
